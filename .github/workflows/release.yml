name: Create Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v5
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: |
            aarch64-linux-android
      - name: Build for Android
        env:
          RELEASE: 1
        run: ./android_build.ps1

      - name: Upload Android binaries
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/*.so
            build/*.json
            
  build-windows:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v5
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
      - name: Build for Windows
        run: |
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release
          move build\x86_64-pc-windows-msvc\release\hachimi_ura_plugin.dll build
      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            build/*.dll

  create-release:
    needs: [build-windows,build-android]
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Get release version
        id: get_info
        run: |
          VERSION=$(grep -E '^version\s*=' Cargo.toml | head -1 | awk -F '"' '{print $2}')
          echo "RELEASE_VERSION=v$VERSION" >> $GITHUB_ENV
          echo "LATEST_TAG=v$VERSION" >> $GITHUB_ENV
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
